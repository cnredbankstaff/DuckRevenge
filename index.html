<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duck Revenge</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap');
    
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }
    
    .game-font {
      font-family: 'Bangers', cursive;
      letter-spacing: 2px;
    }
    
    .comic-font {
      font-family: 'Comic Neue', cursive;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-10px) rotate(2deg); }
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px) rotate(-5deg); }
      75% { transform: translateX(5px) rotate(5deg); }
    }
    
    @keyframes pop {
      0% { transform: scale(0); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    
    @keyframes spin-fall {
      0% { transform: rotate(0deg) translateY(0); opacity: 1; }
      100% { transform: rotate(720deg) translateY(100px); opacity: 0; }
    }
    
    @keyframes bounce-away {
      0% { transform: translateY(0) scaleY(1); }
      30% { transform: translateY(-30px) scaleY(0.8); }
      100% { transform: translateY(150px) scaleY(1.2); opacity: 0; }
    }
    
    @keyframes slip {
      0% { transform: rotate(0) translateX(0); }
      25% { transform: rotate(-20deg) translateX(-10px); }
      50% { transform: rotate(20deg) translateX(10px); }
      75% { transform: rotate(-10deg) translateX(-5px); }
      100% { transform: rotate(90deg) translateX(0) translateY(50px); opacity: 0; }
    }
    
    @keyframes powerup-glow {
      0%, 100% { filter: drop-shadow(0 0 10px gold); }
      50% { filter: drop-shadow(0 0 20px gold); }
    }
    
    @keyframes combo-flash {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); }
      100% { transform: scale(2); opacity: 0; }
    }
    
    .float-anim {
      animation: float 2s ease-in-out infinite;
    }
    
    .shake-anim {
      animation: shake 0.5s ease-in-out;
    }
    
    .pop-anim {
      animation: pop 0.3s ease-out;
    }
    
    .spin-fall-anim {
      animation: spin-fall 0.8s ease-in forwards;
    }
    
    .bounce-away-anim {
      animation: bounce-away 0.6s ease-in forwards;
    }
    
    .slip-anim {
      animation: slip 0.7s ease-in forwards;
    }
    
    .powerup-glow {
      animation: powerup-glow 1s ease-in-out infinite;
    }
    
    .combo-text {
      animation: combo-flash 0.5s ease-out forwards;
    }
    
    .game-canvas {
      background: linear-gradient(180deg, #87CEEB 0%, #98D8AA 70%, #4A7C23 100%);
    }
    
    .meadow-bg { background: linear-gradient(180deg, #87CEEB 0%, #98FB98 70%, #228B22 100%); }
    .forest-bg { background: linear-gradient(180deg, #4A6741 0%, #2D5016 50%, #1A3009 100%); }
    .backyard-bg { background: linear-gradient(180deg, #FFB347 0%, #98D8AA 60%, #5D4E37 100%); }
    .dogpark-bg { background: linear-gradient(180deg, #FF6B6B 0%, #98D8AA 70%, #8B4513 100%); }
    .championship-bg { background: linear-gradient(180deg, #FFD700 0%, #FFA500 50%, #FF6347 100%); }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="w-full h-full overflow-hidden"></div>
  <script>
    // Game Configuration
    const defaultConfig = {
      game_title: 'Duck Revenge',
      start_button_text: 'START GAME'
    };

    let config = { ...defaultConfig };

    // Initialize Element SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (newConfig) => {
          config = { ...defaultConfig, ...newConfig };
          updateConfigUI();
        },
        mapToCapabilities: (cfg) => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (cfg) => new Map([
          ['game_title', cfg.game_title || defaultConfig.game_title],
          ['start_button_text', cfg.start_button_text || defaultConfig.start_button_text]
        ])
      });
    }

    function updateConfigUI() {
      const titleEl = document.getElementById('game-title');
      const startBtn = document.getElementById('start-btn-text');
      if (titleEl) titleEl.textContent = config.game_title || defaultConfig.game_title;
      if (startBtn) startBtn.textContent = config.start_button_text || defaultConfig.start_button_text;
    }

    // Game State
    const gameState = {
      screen: 'start', // start, game, gameover
      score: 0,
      highScore: 0,
      time: 60,
      level: 1,
      levelName: 'Sunny Meadow',
      combo: 0,
      comboTimer: 0,
      duck: { x: 400, y: 300, vx: 0, vy: 0, invincible: false, rapidFire: false, squadActive: false },
      dogs: [],
      projectiles: [],
      powerups: [],
      particles: [],
      comboTexts: [],
      keys: {},
      mousePos: { x: 400, y: 300 },
      lastShot: 0,
      dogsTagged: 0
    };

    const LEVELS = [
      { name: 'Sunny Meadow', bg: 'meadow-bg', dogSpeed: 1, spawnRate: 2000 },
      { name: 'Forest Picnic', bg: 'forest-bg', dogSpeed: 1.3, spawnRate: 1800 },
      { name: 'Backyard BBQ', bg: 'backyard-bg', dogSpeed: 1.6, spawnRate: 1500 },
      { name: 'Dog Park Chaos', bg: 'dogpark-bg', dogSpeed: 2, spawnRate: 1200 },
      { name: 'Golden Duck Championship', bg: 'championship-bg', dogSpeed: 2.5, spawnRate: 1000 }
    ];

    const DOG_REACTIONS = ['spin-fall-anim', 'bounce-away-anim', 'slip-anim'];

    // SVG Generators
    function createDuckSVG(facing = 'right', isSquad = false) {
      const flip = facing === 'left' ? 'transform="scale(-1,1)" transform-origin="center"' : '';
      const color = isSquad ? '#FFD93D' : '#FFD700';
      const bodyColor = isSquad ? '#FFA500' : '#FF8C00';
      return `
        <svg viewBox="0 0 60 50" ${flip}>
          <ellipse cx="30" cy="30" rx="20" ry="15" fill="${color}"/>
          <circle cx="40" cy="20" r="12" fill="${color}"/>
          <ellipse cx="52" cy="22" rx="8" ry="4" fill="${bodyColor}"/>
          <circle cx="45" cy="17" r="3" fill="#333"/>
          <circle cx="46" cy="16" r="1" fill="white"/>
          <ellipse cx="12" cy="30" rx="8" ry="4" fill="${bodyColor}" transform="rotate(-20 12 30)"/>
          <ellipse cx="25" cy="42" rx="4" ry="3" fill="${bodyColor}"/>
          <ellipse cx="35" cy="42" rx="4" ry="3" fill="${bodyColor}"/>
          <path d="M 42 20 Q 48 18 44 25" stroke="#333" stroke-width="1" fill="none"/>
        </svg>
      `;
    }

    function createDogSVG(type = 0) {
      const colors = ['#8B4513', '#D2691E', '#A0522D', '#CD853F'];
      const color = colors[type % colors.length];
      return `
        <svg viewBox="0 0 50 50">
          <ellipse cx="25" cy="30" rx="18" ry="12" fill="${color}"/>
          <circle cx="35" cy="18" r="10" fill="${color}"/>
          <ellipse cx="45" cy="20" rx="5" ry="3" fill="#FFB6C1"/>
          <ellipse cx="38" cy="25" rx="4" ry="3" fill="#333"/>
          <circle cx="38" cy="15" r="2.5" fill="#333"/>
          <circle cx="39" cy="14" r="1" fill="white"/>
          <ellipse cx="8" cy="28" rx="6" ry="3" fill="${color}" transform="rotate(30 8 28)"/>
          <ellipse cx="20" cy="40" rx="3" ry="4" fill="${color}"/>
          <ellipse cx="30" cy="40" rx="3" ry="4" fill="${color}"/>
          <path d="M 25 15 Q 20 8 28 10" stroke="${color}" stroke-width="3" fill="none"/>
          <path d="M 28 15 Q 32 5 35 12" stroke="${color}" stroke-width="3" fill="none"/>
        </svg>
      `;
    }

    function createBushSVG() {
      return `
        <svg viewBox="0 0 80 50">
          <ellipse cx="20" cy="35" rx="18" ry="15" fill="#228B22"/>
          <ellipse cx="40" cy="30" rx="22" ry="18" fill="#2E8B2E"/>
          <ellipse cx="60" cy="35" rx="18" ry="15" fill="#228B22"/>
          <ellipse cx="30" cy="40" rx="15" ry="10" fill="#1E7B1E"/>
          <ellipse cx="50" cy="40" rx="15" ry="10" fill="#1E7B1E"/>
        </svg>
      `;
    }

    function createTreeSVG() {
      return `
        <svg viewBox="0 0 60 80">
          <rect x="25" y="50" width="10" height="30" fill="#8B4513"/>
          <ellipse cx="30" cy="30" rx="25" ry="28" fill="#228B22"/>
          <ellipse cx="20" cy="35" rx="15" ry="12" fill="#2E8B2E"/>
          <ellipse cx="40" cy="35" rx="15" ry="12" fill="#2E8B2E"/>
          <ellipse cx="30" cy="20" rx="18" ry="15" fill="#3CB371"/>
        </svg>
      `;
    }

    function createProjectileSVG() {
      return `
        <svg viewBox="0 0 20 20">
          <circle cx="10" cy="10" r="8" fill="#00BFFF" opacity="0.8"/>
          <circle cx="10" cy="10" r="5" fill="#87CEEB"/>
          <circle cx="8" cy="8" r="2" fill="white"/>
        </svg>
      `;
    }

    function createPowerupSVG(type) {
      if (type === 'rapid') {
        return `<svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="18" fill="#FF4500"/><text x="20" y="26" text-anchor="middle" fill="white" font-size="16" font-weight="bold">⚡</text></svg>`;
      } else if (type === 'shield') {
        return `<svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="18" fill="#4169E1"/><text x="20" y="26" text-anchor="middle" fill="white" font-size="16" font-weight="bold">🛡</text></svg>`;
      } else {
        return `<svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="18" fill="#FFD700"/><text x="20" y="26" text-anchor="middle" fill="white" font-size="16" font-weight="bold">🦆</text></svg>`;
      }
    }

    // Render Functions
    function renderStartScreen() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="w-full h-full meadow-bg flex flex-col items-center justify-center relative overflow-hidden">
          <!-- Decorative elements -->
          <div class="absolute bottom-0 left-10 w-24 h-16">${createBushSVG()}</div>
          <div class="absolute bottom-0 right-10 w-24 h-16">${createBushSVG()}</div>
          <div class="absolute bottom-0 left-1/4 w-20 h-28">${createTreeSVG()}</div>
          <div class="absolute bottom-0 right-1/4 w-20 h-28">${createTreeSVG()}</div>
          
          <!-- Floating ducks -->
          <div class="absolute top-20 left-20 w-16 h-14 float-anim" style="animation-delay: 0s">${createDuckSVG()}</div>
          <div class="absolute top-32 right-24 w-14 h-12 float-anim" style="animation-delay: 0.5s">${createDuckSVG('left')}</div>
          <div class="absolute top-16 right-1/3 w-12 h-10 float-anim" style="animation-delay: 1s">${createDuckSVG()}</div>
          
          <!-- Title -->
          <div class="relative z-10 text-center">
            <h1 id="game-title" class="game-font text-7xl text-yellow-400 drop-shadow-lg mb-2" style="text-shadow: 4px 4px 0 #8B4513, -2px -2px 0 #FFD700;">
              ${config.game_title || defaultConfig.game_title}
            </h1>
            <p class="comic-font text-2xl text-white drop-shadow-md mb-8">The Ducks Strike Back! 🦆💥🐕</p>
            
            <!-- Duck mascot -->
            <div class="w-32 h-28 mx-auto mb-8 float-anim">${createDuckSVG()}</div>
            
            <!-- Start button -->
            <button onclick="startGame()" class="game-font text-3xl bg-gradient-to-b from-green-400 to-green-600 text-white px-12 py-4 rounded-full shadow-lg hover:from-green-300 hover:to-green-500 transform hover:scale-110 transition-all duration-200 border-4 border-green-800">
              <span id="start-btn-text">${config.start_button_text || defaultConfig.start_button_text}</span>
            </button>
            
            <!-- High score -->
            ${gameState.highScore > 0 ? `<p class="comic-font text-xl text-yellow-300 mt-4">🏆 High Score: ${gameState.highScore}</p>` : ''}
            
            <!-- Controls -->
            <div class="mt-8 comic-font text-white text-lg">
              <p class="mb-2">🎮 <span class="text-yellow-300">WASD / Arrows</span> to move</p>
              <p>💦 <span class="text-cyan-300">Space / Click</span> to shoot</p>
            </div>
          </div>
          
          <!-- Dogs peeking -->
          <div class="absolute bottom-0 left-32 w-12 h-12 shake-anim" style="animation-iteration-count: infinite">${createDogSVG(0)}</div>
          <div class="absolute bottom-0 right-40 w-10 h-10 shake-anim" style="animation-delay: 0.3s; animation-iteration-count: infinite">${createDogSVG(1)}</div>
        </div>
      `;
    }

    function renderGameScreen() {
      const app = document.getElementById('app');
      const level = LEVELS[gameState.level - 1] || LEVELS[0];
      
      app.innerHTML = `
        <div id="game-area" class="w-full h-full ${level.bg} relative overflow-hidden cursor-crosshair select-none">
          <!-- HUD -->
          <div class="absolute top-4 left-4 right-4 flex justify-between items-start z-50 pointer-events-none">
            <div class="bg-black/50 rounded-xl px-4 py-2 backdrop-blur-sm">
              <p class="game-font text-2xl text-yellow-400">SCORE: <span id="score">${gameState.score}</span></p>
              <p class="comic-font text-sm text-green-300">Level ${gameState.level}: ${level.name}</p>
            </div>
            <div class="bg-black/50 rounded-xl px-4 py-2 backdrop-blur-sm text-center">
              <p class="game-font text-3xl ${gameState.time <= 10 ? 'text-red-400' : 'text-white'}" id="timer">${gameState.time}</p>
              <p class="comic-font text-xs text-gray-300">SECONDS</p>
            </div>
            <div class="bg-black/50 rounded-xl px-4 py-2 backdrop-blur-sm text-right">
              ${gameState.combo > 1 ? `<p class="game-font text-xl text-orange-400">COMBO x${gameState.combo}!</p>` : ''}
              <div class="flex gap-2 mt-1">
                ${gameState.duck.rapidFire ? '<span class="text-xl">⚡</span>' : ''}
                ${gameState.duck.invincible ? '<span class="text-xl">🛡</span>' : ''}
                ${gameState.duck.squadActive ? '<span class="text-xl">🦆🦆</span>' : ''}
              </div>
            </div>
          </div>
          
          <!-- Scenery -->
          <div class="absolute bottom-0 left-5 w-24 h-16">${createBushSVG()}</div>
          <div class="absolute bottom-0 right-8 w-20 h-14">${createBushSVG()}</div>
          <div class="absolute bottom-0 left-1/4 w-28 h-20">${createBushSVG()}</div>
          <div class="absolute bottom-0 right-1/4 w-24 h-16">${createBushSVG()}</div>
          <div class="absolute bottom-0 left-1/3 w-16 h-24">${createTreeSVG()}</div>
          <div class="absolute bottom-0 right-1/3 w-14 h-20">${createTreeSVG()}</div>
          
          <!-- Game entities container -->
          <div id="entities"></div>
          
          <!-- Combo texts container -->
          <div id="combo-texts"></div>
          
          <!-- Duck player -->
          <div id="duck" class="absolute w-16 h-14 transition-transform duration-75" style="left: ${gameState.duck.x}px; top: ${gameState.duck.y}px; ${gameState.duck.invincible ? 'filter: drop-shadow(0 0 10px cyan);' : ''}">
            ${createDuckSVG(gameState.duck.vx >= 0 ? 'right' : 'left')}
          </div>
          
          <!-- Squad ducks -->
          ${gameState.duck.squadActive ? `
            <div id="squad1" class="absolute w-12 h-10" style="left: ${gameState.duck.x - 40}px; top: ${gameState.duck.y + 20}px;">
              ${createDuckSVG('right', true)}
            </div>
            <div id="squad2" class="absolute w-12 h-10" style="left: ${gameState.duck.x + 50}px; top: ${gameState.duck.y + 20}px;">
              ${createDuckSVG('left', true)}
            </div>
          ` : ''}
        </div>
      `;

      // Add event listeners
      const gameArea = document.getElementById('game-area');
      gameArea.addEventListener('mousemove', (e) => {
        const rect = gameArea.getBoundingClientRect();
        gameState.mousePos.x = e.clientX - rect.left;
        gameState.mousePos.y = e.clientY - rect.top;
      });
      gameArea.addEventListener('click', shoot);
    }

    function renderGameOverScreen() {
      const app = document.getElementById('app');
      const isHighScore = gameState.score > gameState.highScore;
      if (isHighScore) gameState.highScore = gameState.score;

      app.innerHTML = `
        <div class="w-full h-full bg-gradient-to-b from-purple-900 via-purple-700 to-pink-600 flex flex-col items-center justify-center relative overflow-hidden">
          <!-- Confetti/particles -->
          ${Array(20).fill(0).map((_, i) => `
            <div class="absolute w-4 h-4 rounded-full" style="
              left: ${Math.random() * 100}%;
              top: -20px;
              background: ${['#FFD700', '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4'][i % 5]};
              animation: fall ${2 + Math.random() * 3}s linear infinite;
              animation-delay: ${Math.random() * 2}s;
            "></div>
          `).join('')}
          
          <div class="text-center z-10">
            <h1 class="game-font text-6xl text-white mb-4" style="text-shadow: 3px 3px 0 #333;">
              ${isHighScore ? '🎉 NEW HIGH SCORE! 🎉' : 'GAME OVER!'}
            </h1>
            
            <div class="w-24 h-20 mx-auto mb-6">${createDuckSVG()}</div>
            
            <div class="bg-black/40 rounded-2xl px-8 py-6 mb-8 backdrop-blur-sm">
              <p class="game-font text-5xl text-yellow-400 mb-2">${gameState.score}</p>
              <p class="comic-font text-xl text-white">Dogs Tagged: ${gameState.dogsTagged} 🐕</p>
              <p class="comic-font text-lg text-gray-300 mt-2">Level Reached: ${LEVELS[gameState.level - 1]?.name || 'Sunny Meadow'}</p>
              ${gameState.highScore > 0 ? `<p class="comic-font text-lg text-yellow-300 mt-2">🏆 Best: ${gameState.highScore}</p>` : ''}
            </div>
            
            <button onclick="startGame()" class="game-font text-2xl bg-gradient-to-b from-green-400 to-green-600 text-white px-10 py-3 rounded-full shadow-lg hover:from-green-300 hover:to-green-500 transform hover:scale-110 transition-all duration-200 border-4 border-green-800 mr-4">
              PLAY AGAIN
            </button>
            
            <button onclick="goToStart()" class="game-font text-2xl bg-gradient-to-b from-blue-400 to-blue-600 text-white px-10 py-3 rounded-full shadow-lg hover:from-blue-300 hover:to-blue-500 transform hover:scale-110 transition-all duration-200 border-4 border-blue-800">
              MENU
            </button>
          </div>
          
          <!-- Celebration ducks -->
          <div class="absolute bottom-10 left-10 w-16 h-14 float-anim">${createDuckSVG()}</div>
          <div class="absolute bottom-10 right-10 w-16 h-14 float-anim" style="animation-delay: 0.5s">${createDuckSVG('left')}</div>
        </div>
        
        <style>
          @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }
          }
        </style>
      `;
    }

    // Game Logic
    function startGame() {
      gameState.screen = 'game';
      gameState.score = 0;
      gameState.time = 60;
      gameState.level = 1;
      gameState.combo = 0;
      gameState.comboTimer = 0;
      gameState.duck = { x: 400, y: 300, vx: 0, vy: 0, invincible: false, rapidFire: false, squadActive: false };
      gameState.dogs = [];
      gameState.projectiles = [];
      gameState.powerups = [];
      gameState.particles = [];
      gameState.comboTexts = [];
      gameState.dogsTagged = 0;
      gameState.lastShot = 0;
      
      renderGameScreen();
      requestAnimationFrame(gameLoop);
      
      // Start timer
      gameState.timerInterval = setInterval(() => {
        gameState.time--;
        const timerEl = document.getElementById('timer');
        if (timerEl) {
          timerEl.textContent = gameState.time;
          if (gameState.time <= 10) timerEl.classList.add('text-red-400');
        }
        
        // Level progression based on time
        if (gameState.time === 48) levelUp(2);
        if (gameState.time === 36) levelUp(3);
        if (gameState.time === 24) levelUp(4);
        if (gameState.time === 12) levelUp(5);
        
        if (gameState.time <= 0) {
          endGame();
        }
      }, 1000);
      
      // Spawn dogs periodically
      spawnDog();
      gameState.spawnInterval = setInterval(spawnDog, LEVELS[0].spawnRate);
      
      // Spawn powerups occasionally
      gameState.powerupInterval = setInterval(spawnPowerup, 8000);
    }

    function levelUp(level) {
      if (level > 5) return;
      gameState.level = level;
      const levelData = LEVELS[level - 1];
      gameState.levelName = levelData.name;
      
      // Update spawn rate
      clearInterval(gameState.spawnInterval);
      gameState.spawnInterval = setInterval(spawnDog, levelData.spawnRate);
      
      // Update background
      const gameArea = document.getElementById('game-area');
      if (gameArea) {
        LEVELS.forEach(l => gameArea.classList.remove(l.bg));
        gameArea.classList.add(levelData.bg);
      }
      
      // Show level announcement
      showLevelAnnouncement(level, levelData.name);
    }

    function showLevelAnnouncement(level, name) {
      const gameArea = document.getElementById('game-area');
      if (!gameArea) return;
      
      const announcement = document.createElement('div');
      announcement.className = 'absolute inset-0 flex items-center justify-center z-40 pointer-events-none';
      announcement.innerHTML = `
        <div class="bg-black/70 px-8 py-4 rounded-2xl pop-anim">
          <p class="game-font text-4xl text-yellow-400">Level ${level}</p>
          <p class="comic-font text-xl text-white">${name}</p>
        </div>
      `;
      gameArea.appendChild(announcement);
      
      setTimeout(() => announcement.remove(), 2000);
    }

    function endGame() {
      gameState.screen = 'gameover';
      clearInterval(gameState.timerInterval);
      clearInterval(gameState.spawnInterval);
      clearInterval(gameState.powerupInterval);
      renderGameOverScreen();
    }

    function goToStart() {
      gameState.screen = 'start';
      renderStartScreen();
    }

    function spawnDog() {
      if (gameState.screen !== 'game') return;
      
      const gameArea = document.getElementById('game-area');
      if (!gameArea) return;
      
      const rect = gameArea.getBoundingClientRect();
      const side = Math.floor(Math.random() * 4);
      let x, y;
      
      switch (side) {
        case 0: x = -50; y = Math.random() * (rect.height - 100) + 50; break;
        case 1: x = rect.width + 10; y = Math.random() * (rect.height - 100) + 50; break;
        case 2: x = Math.random() * (rect.width - 100) + 50; y = rect.height + 10; break;
        default: x = Math.random() * (rect.width - 100) + 50; y = -50;
      }
      
      const level = LEVELS[gameState.level - 1] || LEVELS[0];
      
      gameState.dogs.push({
        id: Date.now() + Math.random(),
        x, y,
        type: Math.floor(Math.random() * 4),
        speed: (1 + Math.random() * 0.5) * level.dogSpeed,
        hit: false,
        reaction: null
      });
    }

    function spawnPowerup() {
      if (gameState.screen !== 'game') return;
      
      const gameArea = document.getElementById('game-area');
      if (!gameArea) return;
      
      const rect = gameArea.getBoundingClientRect();
      const types = ['rapid', 'shield', 'squad'];
      
      gameState.powerups.push({
        id: Date.now(),
        x: 50 + Math.random() * (rect.width - 100),
        y: 50 + Math.random() * (rect.height - 150),
        type: types[Math.floor(Math.random() * types.length)]
      });
    }

    function shoot() {
      if (gameState.screen !== 'game') return;
      
      const now = Date.now();
      const cooldown = gameState.duck.rapidFire ? 100 : 250;
      
      if (now - gameState.lastShot < cooldown) return;
      gameState.lastShot = now;
      
      const dx = gameState.mousePos.x - (gameState.duck.x + 30);
      const dy = gameState.mousePos.y - (gameState.duck.y + 25);
      const dist = Math.sqrt(dx * dx + dy * dy);
      const speed = 12;
      
      gameState.projectiles.push({
        id: Date.now(),
        x: gameState.duck.x + 30,
        y: gameState.duck.y + 25,
        vx: (dx / dist) * speed,
        vy: (dy / dist) * speed
      });
      
      // Squad ducks also shoot
      if (gameState.duck.squadActive) {
        gameState.projectiles.push({
          id: Date.now() + 1,
          x: gameState.duck.x - 20,
          y: gameState.duck.y + 30,
          vx: (dx / dist) * speed,
          vy: (dy / dist) * speed
        });
        gameState.projectiles.push({
          id: Date.now() + 2,
          x: gameState.duck.x + 70,
          y: gameState.duck.y + 30,
          vx: (dx / dist) * speed,
          vy: (dy / dist) * speed
        });
      }
    }

    function updateDuck() {
      const speed = 6;
      const friction = 0.85;
      
      if (gameState.keys['ArrowUp'] || gameState.keys['KeyW']) gameState.duck.vy -= speed * 0.3;
      if (gameState.keys['ArrowDown'] || gameState.keys['KeyS']) gameState.duck.vy += speed * 0.3;
      if (gameState.keys['ArrowLeft'] || gameState.keys['KeyA']) gameState.duck.vx -= speed * 0.3;
      if (gameState.keys['ArrowRight'] || gameState.keys['KeyD']) gameState.duck.vx += speed * 0.3;
      
      gameState.duck.vx *= friction;
      gameState.duck.vy *= friction;
      gameState.duck.x += gameState.duck.vx;
      gameState.duck.y += gameState.duck.vy;
      
      // Bounds
      const gameArea = document.getElementById('game-area');
      if (gameArea) {
        const rect = gameArea.getBoundingClientRect();
        gameState.duck.x = Math.max(0, Math.min(rect.width - 60, gameState.duck.x));
        gameState.duck.y = Math.max(0, Math.min(rect.height - 50, gameState.duck.y));
      }
    }

    function updateEntities() {
      const gameArea = document.getElementById('game-area');
      if (!gameArea) return;
      const rect = gameArea.getBoundingClientRect();
      
      // Update dogs
      gameState.dogs.forEach(dog => {
        if (dog.hit) return;
        
        const dx = gameState.duck.x - dog.x;
        const dy = gameState.duck.y - dog.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        dog.x += (dx / dist) * dog.speed;
        dog.y += (dy / dist) * dog.speed;
        
        // Check collision with duck
        if (!gameState.duck.invincible && dist < 40) {
          // Duck gets hit - lose some time
          gameState.time = Math.max(0, gameState.time - 3);
          gameState.combo = 0;
          dog.hit = true;
          dog.reaction = DOG_REACTIONS[Math.floor(Math.random() * DOG_REACTIONS.length)];
        }
      });
      
      // Update projectiles
      gameState.projectiles.forEach(proj => {
        proj.x += proj.vx;
        proj.y += proj.vy;
      });
      
      // Remove off-screen projectiles
      gameState.projectiles = gameState.projectiles.filter(proj => 
        proj.x > -20 && proj.x < rect.width + 20 && proj.y > -20 && proj.y < rect.height + 20
      );
      
      // Check projectile-dog collisions
      gameState.projectiles.forEach(proj => {
        gameState.dogs.forEach(dog => {
          if (dog.hit) return;
          
          const dx = proj.x - (dog.x + 25);
          const dy = proj.y - (dog.y + 25);
          const dist = Math.sqrt(dx * dx + dy * dy);
          
          if (dist < 30) {
            dog.hit = true;
            dog.reaction = DOG_REACTIONS[Math.floor(Math.random() * DOG_REACTIONS.length)];
            proj.remove = true;
            
            // Score
            gameState.dogsTagged++;
            gameState.combo++;
            gameState.comboTimer = 60;
            const points = 10 * gameState.combo;
            gameState.score += points;
            
            // Show combo text
            if (gameState.combo > 1) {
              gameState.comboTexts.push({
                id: Date.now(),
                x: dog.x,
                y: dog.y,
                text: `+${points} x${gameState.combo}!`,
                timer: 30
              });
            }
            
            // Update score display
            const scoreEl = document.getElementById('score');
            if (scoreEl) scoreEl.textContent = gameState.score;
          }
        });
      });
      
      // Remove hit projectiles
      gameState.projectiles = gameState.projectiles.filter(p => !p.remove);
      
      // Remove hit dogs after animation
      gameState.dogs = gameState.dogs.filter(dog => {
        if (dog.hit) {
          dog.animTimer = (dog.animTimer || 0) + 1;
          return dog.animTimer < 50;
        }
        return true;
      });
      
      // Check powerup collection
      gameState.powerups = gameState.powerups.filter(powerup => {
        const dx = gameState.duck.x + 30 - powerup.x;
        const dy = gameState.duck.y + 25 - powerup.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist < 40) {
          activatePowerup(powerup.type);
          return false;
        }
        return true;
      });
      
      // Combo timer
      if (gameState.comboTimer > 0) {
        gameState.comboTimer--;
        if (gameState.comboTimer === 0) gameState.combo = 0;
      }
      
      // Update combo texts
      gameState.comboTexts = gameState.comboTexts.filter(ct => {
        ct.timer--;
        ct.y -= 2;
        return ct.timer > 0;
      });
    }

    function activatePowerup(type) {
      if (type === 'rapid') {
        gameState.duck.rapidFire = true;
        setTimeout(() => gameState.duck.rapidFire = false, 5000);
      } else if (type === 'shield') {
        gameState.duck.invincible = true;
        setTimeout(() => gameState.duck.invincible = false, 4000);
      } else if (type === 'squad') {
        gameState.duck.squadActive = true;
        setTimeout(() => gameState.duck.squadActive = false, 6000);
      }
    }

    function renderEntities() {
      const entitiesContainer = document.getElementById('entities');
      const comboContainer = document.getElementById('combo-texts');
      if (!entitiesContainer) return;
      
      let html = '';
      
      // Render dogs
      gameState.dogs.forEach(dog => {
        const animClass = dog.hit ? dog.reaction : '';
        html += `<div class="absolute w-12 h-12 ${animClass}" style="left: ${dog.x}px; top: ${dog.y}px;">${createDogSVG(dog.type)}</div>`;
      });
      
      // Render projectiles
      gameState.projectiles.forEach(proj => {
        html += `<div class="absolute w-5 h-5" style="left: ${proj.x - 10}px; top: ${proj.y - 10}px;">${createProjectileSVG()}</div>`;
      });
      
      // Render powerups
      gameState.powerups.forEach(powerup => {
        html += `<div class="absolute w-10 h-10 powerup-glow" style="left: ${powerup.x - 20}px; top: ${powerup.y - 20}px;">${createPowerupSVG(powerup.type)}</div>`;
      });
      
      entitiesContainer.innerHTML = html;
      
      // Render combo texts
      if (comboContainer) {
        comboContainer.innerHTML = gameState.comboTexts.map(ct => 
          `<div class="absolute game-font text-xl text-orange-400 pointer-events-none combo-text" style="left: ${ct.x}px; top: ${ct.y}px;">${ct.text}</div>`
        ).join('');
      }
      
      // Update duck position
      const duckEl = document.getElementById('duck');
      if (duckEl) {
        duckEl.style.left = gameState.duck.x + 'px';
        duckEl.style.top = gameState.duck.y + 'px';
        duckEl.innerHTML = createDuckSVG(gameState.duck.vx >= 0 ? 'right' : 'left');
        duckEl.style.filter = gameState.duck.invincible ? 'drop-shadow(0 0 10px cyan)' : '';
      }
      
      // Update squad ducks
      const squad1 = document.getElementById('squad1');
      const squad2 = document.getElementById('squad2');
      if (gameState.duck.squadActive) {
        if (!squad1) {
          const gameArea = document.getElementById('game-area');
          if (gameArea) {
            const s1 = document.createElement('div');
            s1.id = 'squad1';
            s1.className = 'absolute w-12 h-10';
            s1.innerHTML = createDuckSVG('right', true);
            gameArea.appendChild(s1);
            
            const s2 = document.createElement('div');
            s2.id = 'squad2';
            s2.className = 'absolute w-12 h-10';
            s2.innerHTML = createDuckSVG('left', true);
            gameArea.appendChild(s2);
          }
        } else {
          squad1.style.left = (gameState.duck.x - 40) + 'px';
          squad1.style.top = (gameState.duck.y + 20) + 'px';
          squad2.style.left = (gameState.duck.x + 50) + 'px';
          squad2.style.top = (gameState.duck.y + 20) + 'px';
        }
      } else {
        if (squad1) squad1.remove();
        if (squad2) squad2.remove();
      }
    }

    let lastFrameTime = 0;
    function gameLoop(timestamp) {
      if (gameState.screen !== 'game') return;
      
      const deltaTime = timestamp - lastFrameTime;
      lastFrameTime = timestamp;
      
      updateDuck();
      updateEntities();
      renderEntities();
      
      requestAnimationFrame(gameLoop);
    }

    // Input handling
    document.addEventListener('keydown', (e) => {
      gameState.keys[e.code] = true;
      if (e.code === 'Space') {
        e.preventDefault();
        shoot();
      }
    });

    document.addEventListener('keyup', (e) => {
      gameState.keys[e.code] = false;
    });

    // Initialize
    renderStartScreen();
  </script>
